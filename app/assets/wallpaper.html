<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Live Wall</title>
  <style>
    :root {
      color-scheme: dark;
      --bg-a: #09111f;
      --bg-b: #12304a;
      --bg-c: #214a64;
      --glow: rgba(127, 206, 255, 0.28);
      --line: rgba(255, 255, 255, 0.08);
      --text: rgba(245, 250, 255, 0.9);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background:
        radial-gradient(circle at 20% 20%, rgba(130, 214, 255, 0.25), transparent 35%),
        radial-gradient(circle at 80% 30%, rgba(113, 140, 255, 0.22), transparent 28%),
        linear-gradient(135deg, var(--bg-a), var(--bg-b) 52%, var(--bg-c));
      color: var(--text);
      font-family: "Segoe UI Variable Display", "Bahnschrift", sans-serif;
    }

    body.paused .orb,
    body.paused .grid {
      animation-play-state: paused;
      filter: saturate(0.7);
    }

    body::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(var(--line) 1px, transparent 1px),
        linear-gradient(90deg, var(--line) 1px, transparent 1px);
      background-size: 4rem 4rem;
      opacity: 0.5;
      animation: drift 16s linear infinite;
    }

    .orb {
      position: absolute;
      inset: auto;
      width: min(36vw, 28rem);
      height: min(36vw, 28rem);
      border-radius: 999px;
      filter: blur(0.5px);
      background: radial-gradient(circle at 35% 35%, rgba(255,255,255,0.85), var(--glow) 30%, transparent 68%);
      box-shadow: 0 0 5rem rgba(80, 170, 255, 0.28);
      animation: float 7s ease-in-out infinite alternate;
    }

    .orb.one {
      top: 14%;
      left: 10%;
    }

    .orb.two {
      bottom: 8%;
      right: 12%;
      width: min(26vw, 20rem);
      height: min(26vw, 20rem);
      animation-duration: 9s;
    }

    .panel {
      position: absolute;
      left: 6vw;
      bottom: 10vh;
      padding: 1.2rem 1.4rem;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(6, 11, 20, 0.34);
      backdrop-filter: blur(16px);
      min-width: min(28rem, 72vw);
    }

    .eyebrow {
      font-size: 0.85rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      opacity: 0.7;
      margin-bottom: 0.7rem;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 4.8vw, 4.5rem);
      font-weight: 650;
      line-height: 0.92;
      letter-spacing: -0.04em;
    }

    p {
      margin: 0.9rem 0 0;
      max-width: 34rem;
      font-size: clamp(0.95rem, 1.35vw, 1.12rem);
      line-height: 1.5;
      opacity: 0.82;
    }

    .status {
      position: absolute;
      top: 1rem;
      right: 1rem;
      padding: 0.45rem 0.7rem;
      font-size: 0.8rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(0, 0, 0, 0.24);
      backdrop-filter: blur(10px);
    }

    .video-layer {
      position: absolute;
      width: 1px;
      height: 1px;
      left: -9999px;
      top: -9999px;
      opacity: 0;
      pointer-events: none;
    }

    .canvas-layer {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      background: #000;
    }

    body.has-video::before,
    body.has-video .orb,
    body.has-video .panel {
      display: none;
    }

    body.paused .canvas-layer {
      filter: saturate(0.72) brightness(0.82);
    }

    @keyframes float {
      from { transform: translate3d(-1rem, 0.4rem, 0) scale(0.98); }
      to { transform: translate3d(1.4rem, -1rem, 0) scale(1.04); }
    }

    @keyframes drift {
      from { transform: translate3d(0, 0, 0); }
      to { transform: translate3d(-2rem, -2rem, 0); }
    }
  </style>
</head>
<body>
  <div class="status" id="status">Playing</div>
  <canvas class="canvas-layer" id="video-canvas" hidden></canvas>
  <video class="video-layer" id="video-a" muted playsinline preload="auto" hidden></video>
  <video class="video-layer" id="video-b" muted playsinline preload="auto" hidden></video>
  <div class="orb one"></div>
  <div class="orb two"></div>
  <section class="panel">
    <div class="eyebrow">Live Wall</div>
    <h1>Wallpaper host online.</h1>
    <p>Point the config at any local or remote HTML scene. Playback will pause automatically while a fullscreen app or a watched executable is active.</p>
  </section>
  <script>
    const status = document.getElementById("status");
    const canvas = document.getElementById("video-canvas");
    const context = canvas.getContext("2d", { alpha: false });
    const videos = [
      document.getElementById("video-a"),
      document.getElementById("video-b"),
    ];
    const params = new URLSearchParams(window.location.search);
    const videoUrl = params.get("video");
    let isPaused = false;
    let activeIndex = 0;
    let swapTimer = null;
    let started = false;
    let drawHandle = 0;

    function activeVideo() {
      return videos[activeIndex];
    }

    function standbyVideo() {
      return videos[(activeIndex + 1) % videos.length];
    }

    function clearSwapTimer() {
      if (swapTimer !== null) {
        clearTimeout(swapTimer);
        swapTimer = null;
      }
    }

    function resizeCanvas() {
      const dpr = window.devicePixelRatio || 1;
      const width = Math.max(Math.round(window.innerWidth * dpr), 1);
      const height = Math.max(Math.round(window.innerHeight * dpr), 1);
      if (canvas.width !== width || canvas.height !== height) {
        canvas.width = width;
        canvas.height = height;
      }
    }

    function drawVideoFrame(video) {
      if (!video.videoWidth || !video.videoHeight) {
        return;
      }

      resizeCanvas();
      const destinationWidth = canvas.width;
      const destinationHeight = canvas.height;
      const sourceAspect = video.videoWidth / video.videoHeight;
      const destinationAspect = destinationWidth / destinationHeight;

      let drawWidth = destinationWidth;
      let drawHeight = destinationHeight;
      let drawX = 0;
      let drawY = 0;

      if (sourceAspect > destinationAspect) {
        drawHeight = destinationHeight;
        drawWidth = drawHeight * sourceAspect;
        drawX = (destinationWidth - drawWidth) / 2;
      } else {
        drawWidth = destinationWidth;
        drawHeight = drawWidth / sourceAspect;
        drawY = (destinationHeight - drawHeight) / 2;
      }

      context.drawImage(video, drawX, drawY, drawWidth, drawHeight);
    }

    function renderLoop() {
      drawHandle = requestAnimationFrame(renderLoop);
      if (!started) {
        return;
      }

      const video = activeVideo();
      if (video.readyState >= 2) {
        drawVideoFrame(video);
      }
    }

    function waitForPresentedFrame(video) {
      return new Promise((resolve) => {
        if (typeof video.requestVideoFrameCallback === "function") {
          video.requestVideoFrameCallback(() => resolve());
          return;
        }

        requestAnimationFrame(() => resolve());
      });
    }

    function scheduleSwap() {
      clearSwapTimer();
      const current = activeVideo();
      if (!Number.isFinite(current.duration) || current.duration <= 0) {
        return;
      }

      const remainingMs = Math.max((current.duration - current.currentTime - 0.12) * 1000, 0);
      swapTimer = window.setTimeout(() => {
        void swapVideos();
      }, remainingMs);
    }

    async function primeVideo(video) {
      video.autoplay = false;
      video.defaultMuted = true;
      video.muted = true;
      video.hidden = false;
      video.src = videoUrl;
      video.load();

      await new Promise((resolve, reject) => {
        const onCanPlay = () => {
          cleanup();
          resolve();
        };
        const onError = () => {
          cleanup();
          reject(video.error);
        };
        const cleanup = () => {
          video.removeEventListener("canplay", onCanPlay);
          video.removeEventListener("error", onError);
        };
        video.addEventListener("canplay", onCanPlay);
        video.addEventListener("error", onError);
      });

      video.currentTime = 0.001;
    }

    async function syncPlayback() {
      if (!videoUrl) {
        return;
      }

      if (isPaused) {
        clearSwapTimer();
        for (const video of videos) {
          video.pause();
        }
        return;
      }

      try {
        await activeVideo().play();
        scheduleSwap();
      } catch (error) {
        status.textContent = "Playback blocked";
        console.error(error);
      }
    }

    async function swapVideos() {
      if (isPaused || !videoUrl) {
        return;
      }

      const current = activeVideo();
      const next = standbyVideo();

      try {
        next.currentTime = 0.001;
        await next.play();
        await waitForPresentedFrame(next);
        current.pause();
        activeIndex = (activeIndex + 1) % videos.length;
        drawVideoFrame(activeVideo());
        scheduleSwap();
      } catch (error) {
        status.textContent = "Loop glitch";
        console.error(error);
      }
    }

    if (videoUrl) {
      document.body.classList.add("has-video");
      for (const video of videos) {
        video.addEventListener("error", () => {
          const mediaError = video.error;
          status.textContent = mediaError ? `Video error ${mediaError.code}` : "Video error";
        });
      }

      (async () => {
        try {
          await Promise.all(videos.map((video) => primeVideo(video)));
          canvas.hidden = false;
          drawVideoFrame(activeVideo());
          started = true;
          if (!drawHandle) {
            renderLoop();
          }
          await syncPlayback();
        } catch (error) {
          const mediaError = activeVideo().error || standbyVideo().error;
          status.textContent = mediaError ? `Video error ${mediaError.code}` : "Video error";
          console.error(error);
        }
      })();
    }

    window.addEventListener("resize", () => {
      resizeCanvas();
      if (started) {
        drawVideoFrame(activeVideo());
      }
    });

    window.liveWallSetPaused = (paused) => {
      isPaused = paused;
      document.body.classList.toggle("paused", paused);
      status.textContent = paused ? "Paused" : "Playing";
      if (started) {
        syncPlayback();
      }
    };
  </script>
</body>
</html>
