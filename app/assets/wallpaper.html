<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>weebp-rs</title>
  <style>
    :root {
      color-scheme: dark;
      --bg-a: #09111f;
      --bg-b: #12304a;
      --bg-c: #214a64;
      --glow: rgba(127, 206, 255, 0.28);
      --line: rgba(255, 255, 255, 0.08);
      --text: rgba(245, 250, 255, 0.9);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background:
        radial-gradient(circle at 20% 20%, rgba(130, 214, 255, 0.25), transparent 35%),
        radial-gradient(circle at 80% 30%, rgba(113, 140, 255, 0.22), transparent 28%),
        linear-gradient(135deg, var(--bg-a), var(--bg-b) 52%, var(--bg-c));
      color: var(--text);
      font-family: "Segoe UI Variable Display", "Bahnschrift", sans-serif;
    }

    body.paused .orb,
    body.paused .grid {
      animation-play-state: paused;
      filter: saturate(0.7);
    }

    body::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(var(--line) 1px, transparent 1px),
        linear-gradient(90deg, var(--line) 1px, transparent 1px);
      background-size: 4rem 4rem;
      opacity: 0.5;
      animation: drift 16s linear infinite;
    }

    .orb {
      position: absolute;
      inset: auto;
      width: min(36vw, 28rem);
      height: min(36vw, 28rem);
      border-radius: 999px;
      filter: blur(0.5px);
      background: radial-gradient(circle at 35% 35%, rgba(255,255,255,0.85), var(--glow) 30%, transparent 68%);
      box-shadow: 0 0 5rem rgba(80, 170, 255, 0.28);
      animation: float 7s ease-in-out infinite alternate;
    }

    .orb.one {
      top: 14%;
      left: 10%;
    }

    .orb.two {
      bottom: 8%;
      right: 12%;
      width: min(26vw, 20rem);
      height: min(26vw, 20rem);
      animation-duration: 9s;
    }

    .panel {
      position: absolute;
      left: 6vw;
      bottom: 10vh;
      padding: 1.2rem 1.4rem;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(6, 11, 20, 0.34);
      backdrop-filter: blur(16px);
      min-width: min(28rem, 72vw);
    }

    .eyebrow {
      font-size: 0.85rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      opacity: 0.7;
      margin-bottom: 0.7rem;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 4.8vw, 4.5rem);
      font-weight: 650;
      line-height: 0.92;
      letter-spacing: -0.04em;
    }

    p {
      margin: 0.9rem 0 0;
      max-width: 34rem;
      font-size: clamp(0.95rem, 1.35vw, 1.12rem);
      line-height: 1.5;
      opacity: 0.82;
    }

    .status {
      position: absolute;
      top: 1rem;
      right: 1rem;
      padding: 0.45rem 0.7rem;
      font-size: 0.8rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(0, 0, 0, 0.24);
      backdrop-filter: blur(10px);
    }

    @keyframes float {
      from { transform: translate3d(-1rem, 0.4rem, 0) scale(0.98); }
      to { transform: translate3d(1.4rem, -1rem, 0) scale(1.04); }
    }

    @keyframes drift {
      from { transform: translate3d(0, 0, 0); }
      to { transform: translate3d(-2rem, -2rem, 0); }
    }
  </style>
</head>
<body>
  <div class="status" id="status">Playing</div>
  <div class="orb one"></div>
  <div class="orb two"></div>
  <section class="panel">
    <div class="eyebrow">weebp-rs</div>
    <h1>Wallpaper host online.</h1>
    <p>Point the config at any local or remote HTML scene. Playback will pause automatically while a fullscreen app or a watched executable is active.</p>
  </section>
  <script>
    const status = document.getElementById("status");
    window.weebpSetPaused = (paused) => {
      document.body.classList.toggle("paused", paused);
      status.textContent = paused ? "Paused" : "Playing";
    };
  </script>
</body>
</html>
